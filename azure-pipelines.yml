trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: aws-credentials
- name: AWS_REGION
  value: 'eu-west-1'
- name: ECR_REPO
  value: '159906127313.dkr.ecr.eu-west-1.amazonaws.com/secure-app-real'

stages:
- stage: BuildScanPush
  displayName: 'Build, Scan and Push'
  jobs:
  - job: BuildScanPushJob
    displayName: 'Build, Scan and Push Job'
    steps:
    - checkout: self

    - script: |
        docker build -t secure-app:latest .
      displayName: 'Build Docker Image'

    - script: |
        docker run --rm \
        -v /var/run/docker.sock:/var/run/docker.sock \
        aquasec/trivy:0.50.2 image \
        --severity CRITICAL \
        --exit-code 1 \
        secure-app:latest
      displayName: 'Run Trivy Scan'

    - script: |
        echo "Logging into AWS ECR..."

        aws ecr get-login-password --region $(AWS_REGION) | docker login \
        --username AWS \
        --password-stdin 159906127313.dkr.ecr.eu-west-1.amazonaws.com

        docker tag secure-app:latest $(ECR_REPO):latest
        docker push $(ECR_REPO):latest
      displayName: 'Push to AWS ECR'
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION: $(AWS_REGION)